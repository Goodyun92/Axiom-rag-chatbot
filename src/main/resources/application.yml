spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: rag
  security:
    user:
      name: admin
      password: ${SECURITY_PASSWORD}
    
  # 가상 스레드 활성화 (Java 21/25 최적화)
  threads:
    virtual:
      enabled: true

  # 로컬(Docker) 및 클라우드(Neon DB) 유연한 연동 설정
  datasource:
    # 핵심 변경: 환경 변수가 들어오면 Neon DB 주소 전체를 쓰고, 없으면 로컬 기본 주소로 작동함
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/spring_ai_db}
    username: ${DB_USER:myuser}
    password: ${DB_PASSWORD:mypassword}
    driver-class-name: org.postgresql.Driver

  # 파일 업로드 용량 설정
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  ai:
    openai:
      # 로컬 .env 또는 클라우드 환경변수 주입
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
      embedding:
        options:
          model: text-embedding-3-small
    
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        # 최초 연동 시에만 테이블을 자동 생성하도록 true 유지
        initialize-schema: true

server:
  port: ${PORT:8080} # Render는 배포 시 무작위 포트를 할당하므로 포트 유연화 필수
