spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: rag
    
  # 가상 스레드 활성화 (Java 21/25 최적화)
  threads:
    virtual:
      enabled: true

  # 로컬 PostgreSQL (pgvector) 연동
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:spring_ai_db}
    username: ${DB_USER:myuser}
    password: ${DB_PASSWORD:mypassword}
    driver-class-name: org.postgresql.Driver

  # 파일 업로드 용량 설정
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  ai:
    openai:
      # 로컬 환경변수 주입
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
      embedding:
        options:
          model: text-embedding-3-small
    
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        # true로 설정 시 vector extension 및 테이블 자동 생성
        initialize-schema: true

server:
  port: 8080
