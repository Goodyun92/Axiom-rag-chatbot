<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axiom - 접속 인증</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glow-button {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-button:hover {
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.7);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#6366f1', secondary: '#a855f7' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-950 text-slate-200 h-dvh w-full flex items-center justify-center overflow-hidden relative selection:bg-primary selection:text-white">
    <!-- background glow effect -->
    <div class="absolute w-[500px] h-[500px] rounded-full bg-primary/10 blur-[120px] -top-40 -left-40 pointer-events-none"></div>
    <div class="absolute w-[500px] h-[500px] rounded-full bg-secondary/10 blur-[120px] -bottom-40 -right-40 pointer-events-none"></div>

    <main class="w-full max-w-md px-6 relative z-10">
        <!-- glass card wrapper -->
        <div class="glass rounded-3xl p-8 sm:p-10 shadow-2xl relative overflow-hidden">
            <!-- card border glow indicator -->
            <div class="absolute top-0 inset-x-0 h-[2px] bg-gradient-to-r from-transparent via-primary to-transparent opacity-55"></div>
            
            <div class="flex flex-col items-center mb-8">
                <!-- Lock Icon with neon circle -->
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary/20 to-secondary/20 flex items-center justify-center mb-5 border border-primary/30 shadow-inner">
                    <svg class="w-8 h-8 text-primary animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                
                <h1 class="text-2xl font-bold text-white tracking-tight mb-2">Axiom RAG Chatbot</h1>
                <p class="text-sm text-slate-400 text-center">서비스 보호를 위해 인증 비밀번호를 입력해주세요.</p>
            </div>

            <!-- Error alert -->
            <div th:if="${param.error != null}" class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-start space-x-3">
                <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                <span>비밀번호가 올바르지 않습니다. 다시 입력해 주세요.</span>
            </div>


            <!-- Login form -->
            <form th:action="@{/login}" method="post" class="space-y-6">
                <!-- Hidden username field to satisfy Spring Security -->
                <input type="hidden" name="username" value="admin">
                
                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-primary to-secondary rounded-xl blur opacity-20 group-hover:opacity-40 transition duration-500"></div>
                    <div class="relative bg-slate-900 border border-white/10 rounded-xl flex items-center pl-4 pr-3 py-1 focus-within:border-primary/50 transition-colors">
                        <svg class="w-5 h-5 text-slate-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path>
                        </svg>
                        <input type="password" name="password" id="password" class="w-full bg-transparent py-3 text-slate-200 placeholder-slate-500 focus:outline-none text-sm sm:text-base" placeholder="비밀번호를 입력하세요" required autofocus>
                    </div>
                </div>

                <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-primary to-secondary text-white font-semibold rounded-xl hover:shadow-lg glow-button active:scale-[0.98] transition duration-200">
                    인증 및 입장
                </button>
            </form>
        </div>
        
        <p class="text-center mt-6 text-xs text-slate-600">Axiom Intelligent RAG Assistant &copy; 2026</p>
    </main>
</body>
</html>
